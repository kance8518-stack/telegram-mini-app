<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reward Zone</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #FFD166;
      --green: #06D6A0;
      --dark: #0D0D0D;
      --card: #161616;
      --text: #F0F0F0;
      --muted: #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 40px;
      overflow-x: hidden;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,209,102,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { width: 100%; max-width: 400px; position: relative; z-index: 1; }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease both;
    }
    .header .emoji { font-size: 48px; display: block; margin-bottom: 8px; }
    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -0.5px;
    }
    .header p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    /* Coin display */
    .coin-card {
      background: var(--card);
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      margin-bottom: 20px;
      animation: fadeUp 0.6s 0.1s ease both;
      position: relative;
      overflow: hidden;
    }
    .coin-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,209,102,0.04), transparent);
      pointer-events: none;
    }
    .coin-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .coin-value {
      font-family: 'Syne', sans-serif;
      font-size: 52px;
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
      transition: all 0.4s ease;
    }
    .coin-value.bump {
      transform: scale(1.15);
      color: #fff;
    }
    .coin-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Claim button */
    .btn-claim {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--gold), #f4a800);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      box-shadow: 0 4px 24px rgba(255,209,102,0.3);
      animation: fadeUp 0.6s 0.2s ease both;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-claim:active { transform: scale(0.97); }
    .btn-claim:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-claim .icon { font-size: 20px; }

    /* Cooldown bar */
    .cooldown-wrap {
      background: var(--card);
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      animation: fadeUp 0.6s 0.25s ease both;
    }
    .cooldown-wrap.hidden { display: none; }
    .cooldown-icon { font-size: 20px; }
    .cooldown-info { flex: 1; }
    .cooldown-info span {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }
    .cooldown-bar-bg {
      height: 6px;
      background: #2a2a2a;
      border-radius: 99px;
      overflow: hidden;
    }
    .cooldown-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), #00b894);
      border-radius: 99px;
      transition: width 1s linear;
    }
    .cooldown-timer {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      color: var(--green);
      min-width: 36px;
      text-align: right;
    }

    /* History */
    .history-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 10px;
      animation: fadeUp 0.6s 0.3s ease both;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeUp 0.6s 0.35s ease both;
    }
    .history-item {
      background: var(--card);
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .history-item .h-time { color: var(--muted); }
    .history-item .h-reward {
      font-family: 'Syne', sans-serif;
      color: var(--gold);
      font-weight: 700;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 99px;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <span class="emoji">🏆</span>
    <h1>Reward Zone</h1>
    <p>Tonton iklan singkat, kumpulkan koin!</p>
  </div>

  <!-- Coin Display -->
  <div class="coin-card">
    <div class="coin-label">Total Koin Kamu</div>
    <div class="coin-value" id="coinDisplay">0</div>
    <div class="coin-sub">+10 koin per iklan</div>
  </div>

  <!-- Claim Button -->
  <button class="btn-claim" id="claimBtn" onclick="claimReward()">
    <span class="icon">▶️</span>
    Tonton Iklan & Klaim +10 Koin
  </button>

  <!-- Cooldown Bar -->
  <div class="cooldown-wrap hidden" id="cooldownWrap">
    <span class="cooldown-icon">⏳</span>
    <div class="cooldown-info">
      <span>Bisa klaim lagi dalam</span>
      <div class="cooldown-bar-bg">
        <div class="cooldown-bar-fill" id="cooldownFill" style="width:100%"></div>
      </div>
    </div>
    <div class="cooldown-timer" id="cooldownTimer">30s</div>
  </div>

  <!-- History -->
  <div class="history-label">Riwayat Klaim</div>
  <div class="history-list" id="historyList">
    <div style="color:var(--muted);font-size:13px;text-align:center;padding:12px 0;">Belum ada riwayat</div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast">+10 Koin Berhasil Diklaim! 🎉</div>

<script>
  // Init Telegram WebApp
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // State
  let coins = parseInt(localStorage.getItem('rz_coins') || '0');
  let history = JSON.parse(localStorage.getItem('rz_history') || '[]');
  let cooldownActive = false;
  const COOLDOWN = 30; // detik antar klaim

  // ===== GANTI INI DENGAN ZONE ID MONETAG KAMU =====
  const ZONE_ID = 'GANTI_ZONE_ID_KAMU';
  // =================================================

  // Render
  updateDisplay();
  renderHistory();

  function updateDisplay() {
    const el = document.getElementById('coinDisplay');
    el.textContent = coins.toLocaleString('id-ID');
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 400);
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:12px 0;">Belum ada riwayat</div>';
      return;
    }
    list.innerHTML = history.slice(-5).reverse().map(h => `
      <div class="history-item">
        <span class="h-time">${h.time}</span>
        <span class="h-reward">+${h.reward} koin</span>
      </div>
    `).join('');
  }

  function claimReward() {
    if (cooldownActive) return;

    const btn = document.getElementById('claimBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="icon">⏳</span> Memuat iklan...';

    // Tampilkan iklan Monetag
    // Ganti show_XXXXXXX dengan nama fungsi dari Zone ID kamu
    if (typeof window[`show_${ZONE_ID}`] === 'function') {
      window[`show_${ZONE_ID}`]();
    }

    // Simulasi iklan selesai (3 detik) — nanti diintegrasikan via postback
    setTimeout(() => {
      // Tambah koin
      coins += 10;
      localStorage.setItem('rz_coins', coins);

      // Catat history
      const now = new Date();
      const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      history.push({ time: timeStr, reward: 10 });
      localStorage.setItem('rz_history', JSON.stringify(history));

      updateDisplay();
      renderHistory();
      showToast();
      startCooldown();
    }, 3000);
  }

  function startCooldown() {
    cooldownActive = true;
    let remaining = COOLDOWN;

    const wrap = document.getElementById('cooldownWrap');
    const fill = document.getElementById('cooldownFill');
    const timer = document.getElementById('cooldownTimer');
    const btn = document.getElementById('claimBtn');

    wrap.classList.remove('hidden');
    btn.disabled = true;
    btn.innerHTML = '<span class="icon">🔒</span> Tunggu Cooldown...';

    const interval = setInterval(() => {
      remaining--;
      const pct = (remaining / COOLDOWN) * 100;
      fill.style.width = pct + '%';
      timer.textContent = remaining + 's';

      if (remaining <= 0) {
        clearInterval(interval);
        cooldownActive = false;
        wrap.classList.add('hidden');
        btn.disabled = false;
        btn.innerHTML = '<span class="icon">▶️</span> Tonton Iklan & Klaim +10 Koin';
        fill.style.width = '100%';
      }
    }, 1000);
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>

<!-- SDK Monetag — akan aktif setelah kamu dapat Zone ID -->

</body>
</html>
